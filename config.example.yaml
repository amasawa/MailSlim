# MailSlim Configuration
# Copy this file to config.yaml and fill in your credentials.
#
# Gmail: use an App Password (not your regular password)
#   https://myaccount.google.com/apppasswords
# 126 Mail: use an authorization code (not your login password)
#   https://help.mail.163.com/faqDetail.do?code=d7a5dc8471cd0c0e8b4b8f4f8e49998b374173cfe9171305fa1ce630d7f67ac2
# Outlook: uses browser-based OAuth (no password needed in config)

mailboxes:
  gmail:
    enabled: true
    imap_server: imap.gmail.com
    imap_port: 993
    username: "your_email@gmail.com"
    password: "your_app_password"

  # outlook:
  #   enabled: true

  # mail126:
  #   enabled: true
  #   imap_server: imap.126.com
  #   imap_port: 993
  #   username: "your_email@126.com"
  #   password: "your_authorization_code"

# Output paths
output:
  emails_json: emails.json
  candidates_xlsx: delete_candidates.xlsx
  approved_xlsx: approved_delete.xlsx
